name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true # lint has pre-existing warnings; don't block builds yet

      - name: Type-check
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key

      - name: Audit (high severity)
        run: npm audit --audit-level=high
        continue-on-error: true # report-only for now
